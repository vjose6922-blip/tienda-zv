<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data: blob: https://lh3.googleusercontent.com https://drive.google.com https://placehold.co https://via.placeholder.com;
  connect-src 'self' https://script.google.com https://wttr.in;
  font-src 'self';
  frame-src 'none';
  object-src 'none';
  base-uri 'self';
">
  <title>Notificaciones - Z&R Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin>
  <link rel="dns-prefetch" href="https://script.google.com">
  <link rel="dns-prefetch" href="https://lh3.googleusercontent.com">
  <link rel="preload" href="styles.css" as="style">
  <link rel="stylesheet" href="styles.css">
  <!-- PWA Meta Tags -->
<link rel="manifest" href="/tienda-zvmanifest.json">
<meta name="theme-color" content="#3b1f5f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Z&R">
<link rel="apple-touch-icon" href="/tienda-zvlogo.svg">
<meta name="mobile-web-app-capable" content="yes">
  <style>
    /* Estilos adicionales para skeleton loading */
    .skeleton-notif {
      background: white;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .skeleton-header {
      height: 60px;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .skeleton-product {
      height: 80px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .skeleton-actions {
      height: 50px;
      border-radius: 12px;
      margin-top: 16px;
    }
    .shimmer {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    .request-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    
    .request-header-left, .request-header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .request-summary {
      background: #f8f8fc;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .summary-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .stat-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .stat-badge.available {
      background: #e8f5e9;
      color: #2e7d32;
    }
    
    .stat-badge.unavailable {
      background: #ffebee;
      color: #c62828;
    }
    
    .stat-badge.total {
      background: #e8e8ff;
      color: #3b1f5f;
    }
    
    .request-products-container {
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    
    .request-product-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px;
      border-bottom: 1px solid #eee;
      transition: background 0.2s;
    }
    
    .request-product-item:hover {
      background: #f9f9fc;
    }
    
    .request-product-image {
      width: 70px;
      height: 70px;
      flex-shrink: 0;
    }
    
    .request-product-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #f5f5f8;
      border-radius: 12px;
    }
    
    .request-product-info {
      flex: 1;
    }
    
    .request-product-name {
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .request-product-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 12px;
      color: #666;
    }
    
    .meta-item.stock-warning {
      color: #f97316;
    }
    
    .meta-item.price {
      color: #ff4f81;
      font-weight: 500;
    }
    
    .request-product-status {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    
    .notifications-pagination button.active-page {
      background: #3b1f5f;
      color: white;
      border-color: #3b1f5f;
    }
    
    .lazy-notif {
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .lazy-notif.loaded {
      opacity: 1;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
    
    @media (max-width: 768px) {
      .request-header {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .request-product-item {
        flex-direction: column;
        text-align: center;
      }
      
      .request-product-status {
        align-self: center;
      }
    }
  </style>
</head>
<body class="theme-aeromexico">
  <div id="global-loader" class="global-loader hidden">
    <div class="loader-spinner"></div>
    <div class="loader-text">Cargando...</div>
  </div>

  <header class="app-header">
    <div class="header-left">
      <div class="logo-touch-area">
        <span class="logo-mark">Z&R</span>
      </div>
      <div class="header-text">
        <h1 class="app-title">Notificaciones</h1>
        <p class="app-subtitle">Solicitudes de compra</p>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-button" onclick="window.location='admin.html'">⬅</button>
      <button class="icon-button refresh-btn" title="Actualizar">⟳</button>
    </div>
  </header>

  <main class="notifications-wrapper" id="notifications"></main>

  <script src="common.js" defer></script>
  <script src="cache-manager.js" defer></script>
  <script src="notifications-optimized.js" defer></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/tienda-zvsw.js')
          .then(registration => console.log('✅ SW registrado:', registration.scope))
          .catch(error => console.log('❌ Error SW:', error));
      });
    }
  </script>


  
</body>
</html>
