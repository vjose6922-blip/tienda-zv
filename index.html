<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mobile Emulator Fixed</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f14;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

button{
  padding:10px;
  border:0;
  border-radius:8px;
  cursor:pointer;
  background:#2a2a3a;
  color:white;
}

input{
  color:white;
}

.status{
  font-size:14px;
  opacity:.8;
  margin-bottom:10px;
}

.device{
  width:1080px;
  height:2340px;
  background:#111;
  border-radius:40px;
  padding:15px;
  box-shadow:0 0 40px rgba(0,0,0,.7);
  position:relative;
}

iframe{
  width:1080px;
  height:2340px;
  border:0;
  border-radius:30px;
  background:white;
}
</style>
</head>

<body>

<h2>📱 Emulator FIX 1080x2340</h2>

<div class="topbar">
  <input type="file" id="zipInput" accept=".zip">
  <input type="file" id="multiInput" multiple webkitdirectory>
  <button onclick="resetAll()">Reset</button>
</div>

<div class="status" id="status">Esperando archivos...</div>

<div class="device">
  <iframe id="screen"></iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let fileMap = {};
let swReg = null;

const statusEl = document.getElementById("status");
const iframe = document.getElementById("screen");

/* ---------------- SW ---------------- */
function makeSW(){
const code = `
let files = {};

self.addEventListener('message', e=>{
  if(e.data.type==='FILES'){
    files = e.data.files;
  }
});

function mime(p){
  if(p.endsWith('.html')) return 'text/html';
  if(p.endsWith('.css')) return 'text/css';
  if(p.endsWith('.js')) return 'application/javascript';
  if(p.endsWith('.png')) return 'image/png';
  if(p.endsWith('.jpg')) return 'image/jpeg';
  return 'text/plain';
}

self.addEventListener('fetch', e=>{
  let url = new URL(e.request.url);
  let path = url.pathname;

  if(path === '/') path = '/index.html';

  if(files[path]){
    e.respondWith(new Response(files[path],{
      headers:{'Content-Type':mime(path)}
    }));
    return;
  }

  e.respondWith(new Response("404 "+path,{status:404}));
});
`;

return URL.createObjectURL(new Blob([code],{type:"application/javascript"}));
}

/* ---------------- SW REGISTER ---------------- */
async function registerSW(){
  const swUrl = makeSW();

  if(swReg){
    await swReg.unregister();
  }

  swReg = await navigator.serviceWorker.register(swUrl);
  await navigator.serviceWorker.ready;

  navigator.serviceWorker.controller?.postMessage({
    type:"FILES",
    files:fileMap
  });

  statusEl.innerText = "SW activo ✔";
}

/* ---------------- ZIP LOAD ---------------- */
document.getElementById("zipInput").addEventListener("change", async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  statusEl.innerText = "Leyendo ZIP...";

  const zip = await JSZip.loadAsync(file);

  fileMap = {};

  const tasks = [];

  zip.forEach((path, entry)=>{
    if(!entry.dir){
      const fullPath = "/" + path;

      const t = entry.async("text").then(data=>{
        fileMap[fullPath]=data;
      });

      tasks.push(t);
    }
  });

  await Promise.all(tasks);

  statusEl.innerText = "ZIP listo ✔ registrando SW...";

  await registerSW();

  iframe.src = "/index.html";

  statusEl.innerText = "Sitio cargado ✔";
});

/* ---------------- MULTI FILE ---------------- */
document.getElementById("multiInput").addEventListener("change",(e)=>{
  const files = [...e.target.files];

  fileMap = {};

  let count = 0;

  files.forEach(f=>{
    const reader = new FileReader();

    reader.onload = ()=>{
      const path = "/" + (f.webkitRelativePath || f.name);
      fileMap[path] = reader.result;

      count++;

      if(count === files.length){
        statusEl.innerText = "Carpeta cargada ✔ registrando SW...";
        registerSW().then(()=>{
          iframe.src="/index.html";
          statusEl.innerText="Sitio cargado ✔";
        });
      }
    };

    reader.readAsText(f);
  });
});

/* ---------------- RESET ---------------- */
async function resetAll(){
  fileMap = {};
  iframe.src="about:blank";
  statusEl.innerText="Reset...";

  if(swReg){
    await swReg.unregister();
    swReg=null;
  }

  statusEl.innerText="Limpio ✔";
}
</script>

</body>
</html>
