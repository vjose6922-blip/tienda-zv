<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas ZV</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{background:#4b0082;color:white;padding:15px;text-align:center;font-size:20px;cursor:pointer;}
.container{padding:15px;}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px;}
.product{background:white;border-radius:10px;padding:10px;box-shadow:0 2px 5px rgba(0,0,0,0.2);}
.product img{width:100%;border-radius:6px;}
button{background:#4b0082;color:white;border:none;padding:8px;border-radius:5px;width:100%;margin-top:5px;}
.cart{position:fixed;bottom:20px;right:20px;background:#4b0082;color:white;padding:12px;border-radius:50%;cursor:pointer;}
#cartModal,#adminModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;}
.modalContent{background:white;padding:20px;width:90%;max-width:400px;border-radius:10px;max-height:80%;overflow:auto;}
input,textarea,select{width:100%;padding:6px;margin-bottom:6px;}
</style>
</head>
<body>
<header id="logo">Ventas ZV</header>
<div class="container">
<div class="products" id="products"></div>
</div>
<div class="cart" onclick="openCart()">🛒</div>

<!-- CART -->
<div id="cartModal">
<div class="modalContent">
<h3>Carrito</h3>
<div id="cartItems"></div>
<h4 id="total"></h4>
<button onclick="buyWhatsApp()">Comprar</button>
<button onclick="closeCart()">Cerrar</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminModal">
<div class="modalContent">
<h3>Admin: Agregar Producto</h3>
<input id="adminPass" type="password" placeholder="Contraseña">
<button onclick="loginAdmin()">Entrar</button>
<div id="adminPanel" style="display:none;">
<input id="name" placeholder="Nombre">
<input id="price" placeholder="Precio">
<input id="size" placeholder="Talla">
<input id="stock" placeholder="Cantidad">
<input id="category" placeholder="Categoría">
<textarea id="desc" placeholder="Descripción"></textarea>
<input type="file" id="img1">
<input type="file" id="img2">
<input type="file" id="img3">
<button onclick="addProduct()">Guardar</button>
<button onclick="closeAdmin()">Cerrar</button>
</div>
</div>
</div>

<script>
const adminPassword="VALADEZ12"
const whatsappNumber="5218671781272"
let products=[]
let cart=[]
let clickCount=0
let adminLogged=false

// Google Sheets API (Apps Script Web App URL)
const sheetAPI = "https://script.google.com/macros/s/AKfycbwl-pV-QS3Y1OAxD6Rvg5dy4Zd3WlcKRGm3pYclJ7uRY68xAKcuwJDjZmvR6JZvW_k-Zg/exec"; 

// Utils
function uid(){return "P"+Math.floor(Math.random()*100000000)}
function fileToBase64(file){return new Promise(res=>{const reader=new FileReader();reader.onload=e=>res(e.target.result);reader.readAsDataURL(file)})}

// Render
function renderProducts(){
const container=document.getElementById("products")
container.innerHTML=""
products.forEach(p=>{
const div=document.createElement("div")
div.className="product"
div.innerHTML=`
<img src="${p.images1}">
<h4>${p.name}</h4>
<p>${p.price} MX</p>
<p>${p.stock==0?'Agotado':'Stock: '+p.stock}</p>
<button ${p.stock==0?'disabled':''} onclick="addCart('${p.id}')">Agregar</button>
`
container.appendChild(div)
})
}

// Cart
function addCart(id){
const p=products.find(x=>x.id===id)
cart.push({...p,qty:1})
alert("Agregado")
}
function openCart(){document.getElementById("cartModal").style.display="flex";renderCart()}
function closeCart(){document.getElementById("cartModal").style.display="none"}
function renderCart(){
const div=document.getElementById("cartItems");div.innerHTML=""
let total=0
cart.forEach((p,i)=>{
total+=p.price*p.qty
div.innerHTML+=`<p>${p.name}<br>Cantidad:<input type="number" value="${p.qty}" onchange="changeQty(${i},this.value)"></p>`
})
document.getElementById("total").innerText="Total MX$"+total
}
function changeQty(i,val){cart[i].qty=parseInt(val);renderCart()}
function buyWhatsApp(){
let text="Hola quiero comprar:%0A%0A"
let total=0
cart.forEach(p=>{
text+=`Producto: ${p.name}%0AID: ${p.id}%0ACantidad: ${p.qty}%0A%0A`
total+=p.qty*p.price
})
text+=`Total: MX$${total}`
window.open(`https://wa.me/${whatsappNumber}?text=${text}`)
// Actualizar stock en Google Sheets
cart.forEach(p=>{
updateStock(p.id,p.qty)
})
cart=[]
renderProducts()
closeCart()
}

// Admin
document.getElementById("logo").onclick=()=>{
clickCount++
if(clickCount>=10){
document.getElementById("adminModal").style.display="flex"
clickCount=0
}
}
function loginAdmin(){
const pass=document.getElementById("adminPass").value
if(pass===adminPassword){adminLogged=true;document.getElementById("adminPanel").style.display="block";document.getElementById("adminPass").style.display="none";}else{alert("Contraseña incorrecta")}}
function closeAdmin(){document.getElementById("adminModal").style.display="none";document.getElementById("adminPanel").style.display="none";document.getElementById("adminPass").style.display="block";}

// Google Sheets Integration
async function fetchProducts(){
try{
const res=await fetch(sheetAPI)
const data=await res.json()
products=data
renderProducts()
}catch(e){console.error("Error fetching products",e)}
}

async function updateStock(id,qty){
try{
await fetch(sheetAPI,{
method:"POST",
body:JSON.stringify({id,qty}),
headers:{"Content-Type":"application/json"}
})
}catch(e){console.error("Error updating stock",e)}
}

// Add product (Admin)
async function addProduct(){
if(!adminLogged){alert("No autorizado");return;}
const name=document.getElementById("name").value
const price=parseFloat(document.getElementById("price").value)
const size=document.getElementById("size").value
const stock=parseInt(document.getElementById("stock").value)
const category=document.getElementById("category").value
const desc=document.getElementById("desc").value
const imgFiles=[document.getElementById("img1").files[0],document.getElementById("img2").files[0],document.getElementById("img3").files[0]]
const images=[]
for(const f of imgFiles){if(f) images.push(await fileToBase64(f))}
const product={id:uid(),name,price,size,stock,category,desc,images}
// Enviar a Google Sheets
try{
await fetch(sheetAPI,{method:"POST",body:JSON.stringify({product}),headers:{"Content-Type":"application/json"}})
alert("Producto agregado")
document.getElementById("name").value="";document.getElementById("price").value="";document.getElementById("size").value="";document.getElementById("stock").value="";document.getElementById("category").value="";document.getElementById("desc").value="";document.getElementById("img1").value="";document.getElementById("img2").value="";document.getElementById("img3").value=""
fetchProducts()
closeAdmin()
}catch(e){console.error(e);alert("Error agregando producto")}
}

// Inicial
fetchProducts()
</script>
</body>
</html>
