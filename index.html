<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mobile Emulator 1080x2340</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f14;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .topbar {
    width: 100%;
    max-width: 1200px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 15px;
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #2b2b3a;
    color: white;
  }

  button:hover {
    background: #3a3a52;
  }

  input {
    color: white;
  }

  .status {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
  }

  /* Mobile frame */
  .device {
    width: 1080px;
    height: 2340px;
    border-radius: 60px;
    background: #111;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    padding: 20px;
    position: relative;
  }

  iframe {
    width: 1080px;
    height: 2340px;
    border: none;
    border-radius: 40px;
    background: white;
  }

  .notch {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 30px;
    background: black;
    border-radius: 20px;
  }
</style>
</head>

<body>

<h2>📱 Mobile Emulator 1080×2340</h2>

<div class="topbar">
  <input type="file" id="zipInput" accept=".zip" />
  <button onclick="resetAll()">Reset</button>
</div>

<div class="status" id="status">Estado: esperando archivos...</div>

<div class="device">
  <div class="notch"></div>
  <iframe id="screen"></iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let fileMap = {};
let swRegistration = null;

const statusEl = document.getElementById("status");
const iframe = document.getElementById("screen");

/* -----------------------------
   SERVICE WORKER BLOB
------------------------------ */
function createSW() {
  const swCode = `
    let files = {};

    self.addEventListener('message', e => {
      if (e.data.type === 'FILES') {
        files = e.data.files || {};
      }
    });

    function getMime(path) {
      if (path.endsWith('.html')) return 'text/html';
      if (path.endsWith('.css')) return 'text/css';
      if (path.endsWith('.js')) return 'application/javascript';
      if (path.endsWith('.png')) return 'image/png';
      if (path.endsWith('.jpg') || path.endsWith('.jpeg')) return 'image/jpeg';
      if (path.endsWith('.svg')) return 'image/svg+xml';
      return 'text/plain';
    }

    self.addEventListener('fetch', event => {
      let url = new URL(event.request.url);
      let path = url.pathname;

      if (path === '/') path = '/index.html';

      if (files[path]) {
        let res = files[path];

        let response;

        if (typeof res === 'string') {
          response = new Response(res, {
            headers: { 'Content-Type': getMime(path) }
          });
        } else {
          response = new Response(res, {
            headers: { 'Content-Type': getMime(path) }
          });
        }

        event.respondWith(response);
        return;
      }

      event.respondWith(
        new Response('404 Not Found: ' + path, {
          status: 404,
          headers: { 'Content-Type': 'text/plain' }
        })
      );
    });
  `;

  const blob = new Blob([swCode], { type: "application/javascript" });
  return URL.createObjectURL(blob);
}

/* -----------------------------
   REGISTER SW
------------------------------ */
async function registerSW(files) {
  const swUrl = createSW();

  if (swRegistration) {
    await swRegistration.unregister();
  }

  swRegistration = await navigator.serviceWorker.register(swUrl);

  await navigator.serviceWorker.ready;

  navigator.serviceWorker.controller?.postMessage({
    type: "FILES",
    files
  });

  statusEl.textContent = "Estado: SW activo + archivos cargados";
}

/* -----------------------------
   LOAD ZIP
------------------------------ */
document.getElementById("zipInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  statusEl.textContent = "Descomprimiendo ZIP...";

  const zip = await JSZip.loadAsync(file);
  fileMap = {};

  const promises = [];

  zip.forEach((relativePath, zipEntry) => {
    if (!zipEntry.dir) {
      const p = zipEntry.async("blob").then(content => {
        const path = "/" + relativePath;

        // detect text or binary
        if (
          path.endsWith(".html") ||
          path.endsWith(".css") ||
          path.endsWith(".js")
        ) {
          fileMap[path] = null;
          return zipEntry.async("text").then(t => fileMap[path] = t);
        } else {
          fileMap[path] = content;
        }
      });

      promises.push(p);
    }
  });

  await Promise.all(promises);

  await registerSW(fileMap);

  statusEl.textContent = "Estado: cargando app...";

  setTimeout(() => {
    iframe.src = "/index.html";
  }, 500);
});

/* -----------------------------
   RESET
------------------------------ */
async function resetAll() {
  fileMap = {};
  statusEl.textContent = "Reset...";

  if (swRegistration) {
    await swRegistration.unregister();
    swRegistration = null;
  }

  iframe.src = "about:blank";

  statusEl.textContent = "Estado: limpio";
}
</script>

</body>
</html>
